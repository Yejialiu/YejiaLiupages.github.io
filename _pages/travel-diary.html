<style>

  .travel-diary-page {
    --td-bg: #f0ece4;
    --td-ocean: #c8d8e8;
    --td-land: #e8e4dc;
    --td-land-border: #ccc6ba;
    --td-visited: #1a3a6b;
    --td-visited-border: #0f2550;
    --td-dot: #f5a623;
    --td-dot-bright: #ffe066;
    --td-title: #1a3a6b;
    --td-text: #3a3228;
    --td-text-dim: #8a7d6a;
    --td-divider: #c8b89a;
    position: relative;
    background: var(--td-bg);
    color: var(--td-text);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  .travel-diary-page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .travel-diary-page *,
  .travel-diary-page *::before,
  .travel-diary-page *::after {
    box-sizing: border-box;
  }

  .travel-diary-shell {
    position: relative;
    z-index: 1;
  }

  .travel-diary-header {
    text-align: center;
    padding: 2.5rem 2rem 1.2rem;
    border-bottom: 1px solid var(--td-divider);
  }

  .travel-diary-title-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.6em;
    color: var(--td-text-dim);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .travel-diary-title-main {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4.5vw, 3.6rem);
    font-weight: 700;
    color: var(--td-title);
    letter-spacing: 0.04em;
    line-height: 1;
    margin: 0;
  }

  .travel-diary-title-sub {
    font-style: italic;
    font-size: 1.05rem;
    color: var(--td-text-dim);
    margin-top: 0.4rem;
    letter-spacing: 0.12em;
  }

  .travel-diary-stats {
    display: flex;
    justify-content: center;
    border-bottom: 1px solid var(--td-divider);
  }

  .travel-diary-stat {
    text-align: center;
    padding: 1rem 2.8rem;
    border-right: 1px solid var(--td-divider);
  }

  .travel-diary-stat:last-child {
    border-right: none;
  }

  .travel-diary-stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--td-visited);
    line-height: 1;
    font-weight: 700;
  }

  .travel-diary-stat-label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    color: var(--td-text-dim);
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  .travel-diary-map-container {
    width: 100%;
  }

  #travel-diary-map-svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .travel-diary-country {
    fill: var(--td-land);
    stroke: var(--td-land-border);
    stroke-width: 0.5;
  }

  .travel-diary-country.travel-diary-visited {
    fill: var(--td-visited);
    stroke: var(--td-visited-border);
    stroke-width: 0.4;
  }

  .travel-diary-graticule {
    fill: none;
    stroke: rgba(100, 120, 160, 0.08);
    stroke-width: 0.4;
  }

  .travel-diary-city-dot {
    fill: var(--td-dot);
    cursor: pointer;
    filter: drop-shadow(0 0 3px rgba(245, 166, 35, 0.85)) drop-shadow(0 0 7px rgba(245, 166, 35, 0.4));
  }

  .travel-diary-city-dot:hover {
    fill: #fff;
    filter: drop-shadow(0 0 5px #f5a623) drop-shadow(0 0 14px rgba(245, 166, 35, 0.95));
  }

  .travel-diary-tooltip {
    position: fixed;
    background: rgba(26, 58, 107, 0.97);
    border: 1px solid rgba(245, 166, 35, 0.65);
    padding: 0.55rem 1rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 999;
    box-shadow: 0 4px 20px rgba(26, 58, 107, 0.3);
  }

  .travel-diary-tooltip.show {
    opacity: 1;
  }

  .travel-diary-tooltip-city {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.95rem;
    color: var(--td-dot-bright);
  }

  .travel-diary-tooltip-country {
    font-size: 0.72rem;
    color: rgba(200, 215, 235, 0.75);
    margin-top: 0.12rem;
    letter-spacing: 0.08em;
  }

  .travel-diary-bottom {
    border-top: 1px solid var(--td-divider);
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: flex-start;
    padding: 1.2rem 2.5rem 1.5rem;
    gap: 1rem;
  }

  .travel-diary-legend {
    display: flex;
    align-items: center;
    gap: 1.8rem;
    flex-wrap: wrap;
  }

  .travel-diary-legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.72rem;
    color: var(--td-text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .travel-diary-legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--td-dot);
    box-shadow: 0 0 6px rgba(245, 166, 35, 0.7);
    flex-shrink: 0;
  }

  .travel-diary-legend-sq {
    width: 16px;
    height: 11px;
    flex-shrink: 0;
    border-radius: 1px;
  }

  .travel-diary-flag-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    max-width: 560px;
    justify-content: flex-end;
  }

  .travel-diary-flag-tag {
    font-size: 0.75rem;
    padding: 0.18rem 0.55rem;
    border: 1px solid var(--td-divider);
    color: var(--td-text-dim);
    font-family: 'Noto Serif SC', serif;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 2px;
  }

  .travel-diary-footer {
    text-align: center;
    padding: 1.2rem;
    font-size: 0.68rem;
    color: var(--td-text-dim);
    letter-spacing: 0.2em;
    font-style: italic;
    border-top: 1px solid var(--td-divider);
    opacity: 0.8;
  }

  @media (max-width: 900px) {
    .travel-diary-stat {
      padding: 1rem 1.5rem;
    }

    .travel-diary-bottom {
      padding: 1rem 1.25rem 1.3rem;
    }
  }

  @media (max-width: 640px) {
    .travel-diary-header {
      padding: 2rem 1rem 1rem;
    }

    .travel-diary-stats {
      flex-wrap: wrap;
    }

    .travel-diary-stat {
      width: 33.333%;
      min-width: 110px;
      padding: 0.9rem 0.75rem;
    }

    .travel-diary-title-cn {
      letter-spacing: 0.4em;
    }

    .travel-diary-bottom {
      flex-direction: column;
      align-items: stretch;
    }

    .travel-diary-flag-panel {
      justify-content: flex-start;
      max-width: none;
    }
  }
</style>

    };
    const continentList = [...new Set(countryList.map(country => continentMap[country] || "Other"))];

    page.querySelector('#travel-diary-city-count').textContent = cities.length;
    page.querySelector('#travel-diary-country-count').textContent = countryList.length;
    page.querySelector('#travel-diary-continent-count').textContent = continentList.length;

    const flagPanel = page.querySelector('#travel-diary-flag-panel');
    const seenCountries = new Set();
    cities.forEach(city => {
      if (seenCountries.has(city.country)) {
        return;
      }
      seenCountries.add(city.country);
      const tag = document.createElement('div');
      tag.className = 'travel-diary-flag-tag';
      tag.textContent = `${city.flag} ${city.country}`;
      flagPanel.appendChild(tag);
    });

    const width = 960;
    const height = 500;
    const svg = d3.select('#travel-diary-map-svg');
    const projection = d3.geoNaturalEarth1().scale(155).translate([width / 2, height / 2]);
    const path = d3.geoPath().projection(projection);
    const visitedCodes = new Set([276, 40, 752, 348, 203, 756, 300, 724, 380, 336, 250, 492, 578, 208, 410, 702, 392, 156]);

    const layerOcean = svg.append('g');
    const layerGraticule = svg.append('g');
    const layerLand = svg.append('g');
    const layerGlow = svg.append('g').attr('pointer-events', 'none');
    const layerDots = svg.append('g');

    layerOcean.append('rect')
      .attr('width', width)
      .attr('height', height)
      .attr('fill', '#c8d8e8');

    layerGraticule.append('path')
      .datum(d3.geoGraticule()())
      .attr('class', 'travel-diary-graticule')
      .attr('d', path);

    const tooltip = page.querySelector('#travel-diary-tooltip');
    const tooltipCity = page.querySelector('#travel-diary-tooltip-city');
    const tooltipCountry = page.querySelector('#travel-diary-tooltip-country');

    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(response => response.json())
      .then(world => {
        layerLand.selectAll('path')
          .data(topojson.feature(world, world.objects.countries).features)
          .join('path')
          .attr('class', datum => visitedCodes.has(+datum.id) ? 'travel-diary-country travel-diary-visited' : 'travel-diary-country')
          .attr('d', path);

        layerGlow.selectAll('circle')
          .data(cities)
          .join('circle')
          .attr('cx', datum => {
            const point = projection([datum.lon, datum.lat]);
            return point ? point[0] : -999;
          })
          .attr('cy', datum => {
            const point = projection([datum.lon, datum.lat]);
            return point ? point[1] : -999;
          })
          .attr('r', 6)
          .attr('fill', 'rgba(245, 166, 35, 0.16)');

        layerDots.selectAll('circle')
          .data(cities)
          .join('circle')
          .attr('class', 'travel-diary-city-dot')
          .attr('cx', datum => {
            const point = projection([datum.lon, datum.lat]);
            return point ? point[0] : -999;
          })
          .attr('cy', datum => {
            const point = projection([datum.lon, datum.lat]);
            return point ? point[1] : -999;
          })
          .attr('r', 3)
          .on('mousemove', (event, datum) => {
            tooltip.classList.add('show');
            tooltipCity.textContent = `${datum.flag} ${datum.name}`;
            tooltipCountry.textContent = `${datum.en} · ${datum.country}`;
            tooltip.style.left = `${event.clientX + 14}px`;
            tooltip.style.top = `${event.clientY - 12}px`;
          })
          .on('mouseleave', () => {
            tooltip.classList.remove('show');
          });
      })
      .catch(error => {
        console.error('Failed to load travel diary map data.', error);
      });
  })();
</script>
